<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Base</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #f7f7f5; --bg3: #efefeb;
  --text: #1a1a18; --text2: #6b6b65; --text3: #adadaa;
  /* alt: --bg: #FAF9F6; --bg2: #F8F8F4; --bg3: #F0EFEC; */
  /* alt: --text: #141413; --text2: #73726C; */
  --border: rgba(0,0,0,0.10); --border2: rgba(0,0,0,0.18);
  --r: 8px; --rl: 12px;
  --font: system-ui, sans-serif; --mono: ui-monospace, monospace;
}
@media (prefers-color-scheme: dark) {
  :root { --bg:#1c1c1a; --bg2:#242422; --bg3:#2c2c2a; --text:#e8e8e0; --text2:#9a9a94; --text3:#5a5a56; --border:rgba(255,255,255,0.10); --border2:rgba(255,255,255,0.20); }
}
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
a { color: inherit; }
.layout { display: flex; height: 100vh; }
.sidebar { width: 220px; flex-shrink: 0; border-right: 0.5px solid var(--border); display: flex; flex-direction: column; padding: 1rem 0; background: var(--bg2); overflow: hidden; }
.main { flex: 1; overflow-y: auto; padding: 1.5rem 2rem 4rem; }
.sb-title { font-size: 13px; font-weight: 500; padding: 0 1rem 0.75rem; border-bottom: 0.5px solid var(--border); margin-bottom: 0.75rem; }
.sb-section { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); padding: 0 1rem; margin: 0.75rem 0 0.3rem; }
.filter-chip { display: block; width: 100%; text-align: left; font-family: var(--mono); font-size: 11px; padding: 5px 1rem; border: none; background: transparent; cursor: pointer; color: var(--text2); transition: background 0.1s, color 0.1s; }
.filter-chip:hover { background: var(--bg3); color: var(--text); }
.filter-chip.active { background: var(--bg3); color: var(--text); font-weight: 500; }
.sb-count { float: right; font-size: 10px; color: var(--text3); }
.sb-scroll { overflow-y: auto; flex: 1; }
.sb-bottom { flex-shrink: 0; padding: 0.75rem 1rem 0; border-top: 0.5px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
.file-status { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-status.ok { color: #2a7a2a; }
.btn { background: transparent; border: 0.5px solid var(--border2); border-radius: var(--r); padding: 6px 14px; font-size: 13px; cursor: pointer; color: var(--text); font-family: var(--font); transition: background 0.1s; }
.btn:hover { background: var(--bg3); }
.btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
.btn-primary:hover { opacity: 0.85; background: var(--text); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-danger { color: #c00; border-color: rgba(200,0,0,0.3); }
.btn-danger:hover { background: rgba(200,0,0,0.05); }
.btn-sync { color: #185FA5; border-color: rgba(24,95,165,0.3); }
.btn-sync:hover { background: rgba(24,95,165,0.05); }
.file-status.dirty { color: #c44; }
.btn-wide { width: 100%; }
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
.page-title { font-size: 15px; font-weight: 500; }
.header-actions { display: flex; gap: 8px; align-items: center; }
.searchbar { width: 100%; margin-bottom: 1rem; display: flex; gap: 8px; }
.searchbar input { flex: 1; font-family: var(--font); font-size: 14px; padding: 7px 12px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--r); color: var(--text); outline: none; }
.searchbar input:focus { border-color: var(--border2); }
.add-form { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--rl); padding: 1.25rem; margin-bottom: 1.25rem; }
.field { margin-bottom: 11px; }
.field label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text2); display: block; margin-bottom: 4px; }
.field textarea { width: 100%; min-height: 90px; resize: vertical; font-family: var(--font); font-size: 14px; line-height: 1.6; padding: 8px 10px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--r); color: var(--text); outline: none; }
.field textarea:focus { border-color: var(--border2); }
.field input[type=text] { width: 100%; font-family: var(--font); font-size: 13px; padding: 6px 10px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--r); color: var(--text); outline: none; }
.field input[type=text]:focus { border-color: var(--border2); }
.type-picker { display: flex; gap: 5px; flex-wrap: wrap; }
.type-opt { font-family: var(--mono); font-size: 11px; padding: 4px 10px; border-radius: 99px; border: 0.5px solid var(--border2); background: transparent; cursor: pointer; color: var(--text2); transition: all 0.1s; }
.type-opt:hover { color: var(--text); border-color: var(--text3); }
.type-opt.active { border-width: 1.5px; }
.form-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--rl); padding: 1rem 1.1rem; cursor: pointer; transition: border-color 0.12s; }
.card:hover { border-color: var(--border2); }
.card-top { display: flex; align-items: center; gap: 8px; }
.type-badge { font-family: var(--mono); font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; flex-shrink: 0; }
.card-title-text { font-size: 13px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-date { font-family: var(--mono); font-size: 10px; color: var(--text3); flex-shrink: 0; }
.card-id { font-family: var(--mono); font-size: 10px; color: var(--text3); flex-shrink: 0; }
.card-content { font-size: 13px; line-height: 1.65; color: var(--text); font-family: var(--font); word-break: break-word; margin-top: 8px; }
.card-content.clamped { white-space: pre-wrap; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: var(--text2); }
.card-content p { margin: 0 0 0.5em; }
.card-content p:last-child { margin-bottom: 0; }
.card-content ul, .card-content ol { margin: 0.3em 0 0.5em 1.5em; }
.card-content li { margin: 0; }
.card-content li p { margin: 0; }
.card-content code { font-family: var(--mono); font-size: 12px; background: var(--bg2); padding: 1px 4px; border-radius: 3px; }
.card-content pre { background: var(--bg2); padding: 8px 10px; border-radius: var(--r); overflow-x: auto; margin: 0.5em 0; }
.card-content pre code { background: none; padding: 0; }
.card-content a { color: var(--tc, var(--text2)); text-decoration: underline; }
.card-content blockquote { border-left: 2px solid var(--border2); padding-left: 10px; color: var(--text2); margin: 0.5em 0; }
.card-content h1, .card-content h2, .card-content h3 { font-size: 13px; font-weight: 600; margin: 0.5em 0 0.3em; }
.card-meta { margin-top: 7px; display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
.tag { font-family: var(--mono); font-size: 10px; color: var(--text2); background: var(--bg2); padding: 2px 7px; border-radius: 3px; cursor: pointer; } /* alt bg: #F0EEE6 */
.tag:hover { background: var(--bg3); }
.gene { font-family: var(--mono); font-size: 10px; color: #185FA5; background: transparent; padding: 2px 7px; border-radius: 3px; cursor: pointer; } /* alt color: #8A2425 */
.gene:hover { background: rgba(24,95,165,0.08); }
.gene-more { font-family: var(--mono); font-size: 10px; color: #185FA5; background: transparent; padding: 2px 7px; border-radius: 3px; cursor: default; } /* alt color: #8A2425 */
.card-source { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-left: auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
.synced-badge { font-family: var(--mono); font-size: 10px; color: #2a7a2a; }
.unsynced-badge { font-family: var(--mono); font-size: 10px; color: #c44; }
.card-actions { margin-top: 9px; padding-top: 9px; border-top: 0.5px solid var(--border); display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.spacer { flex: 1; }
#item-list { display: flex; gap: 8px; align-items: flex-start; }
.item-col { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
.empty { text-align: center; padding: 4rem 0; color: var(--text3); width: 100%; }
.empty p { font-size: 14px; margin-bottom: 6px; color: var(--text2); }
.empty small { font-family: var(--mono); font-size: 11px; }
.connect-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; gap: 1rem; text-align: center; }
.connect-screen h2 { font-size: 18px; font-weight: 500; }
.connect-screen p { font-size: 14px; color: var(--text2); max-width: 360px; line-height: 1.6; }
.connect-screen code { font-family: var(--mono); font-size: 12px; background: var(--bg2); padding: 2px 6px; border-radius: 4px; }
.toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 8px 18px; border-radius: var(--r); font-size: 13px; opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 99; white-space: nowrap; }
.toast.show { opacity: 1; }
[data-type="fact"]        { --tc:#185FA5; --tbg:rgba(24,95,165,0.10); }
[data-type="idea"]        { --tc:#854F0B; --tbg:rgba(133,79,11,0.10); }
[data-type="hypothesis"]  { --tc:#534AB7; --tbg:rgba(83,74,183,0.10); }
[data-type="quote"]       { --tc:#0F6E56; --tbg:rgba(15,110,86,0.10); }
[data-type="reference"]   { --tc:#5F5E5A; --tbg:rgba(95,94,90,0.10); }
[data-type="observation"] { --tc:#3B6D11; --tbg:rgba(59,109,17,0.10); }
[data-type="connection"]  { --tc:#993556; --tbg:rgba(153,53,86,0.10); }
[data-type="people"]      { --tc:#7A5C1E; --tbg:rgba(122,92,30,0.10); }
.type-badge { color: var(--tc); background: var(--tbg); } /* alt: background: #F0EFEC; border: 1px solid #D1D0CE; */
.type-opt.active { color: var(--tc); background: var(--tbg); border-color: var(--tc); }
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <div class="sb-title">Knowledge Base</div>
    <div class="sb-scroll">
      <div class="sb-section">Sort</div>
      <div id="sort-list"></div>
      <div class="sb-section" style="margin-top:0.75rem">Type</div>
      <div id="filter-list"></div>
      <div id="tag-filter-list"></div>
    </div>
    <div class="sb-bottom">
      <div class="file-status" id="file-status">No file connected</div>
      <button class="btn btn-sm btn-wide" id="btn-connect" onclick="connectFile()">Connect JSON file</button>
    </div>
  </div>
  <div class="main" id="main-area">
    <div class="connect-screen" id="connect-screen">
      <h2>Connect your knowledge base file</h2>
      <p>Choose an existing <code>knowledge-base.json</code> or create a new one. The file stays on your disk and syncs automatically when you switch back to this window.</p>
      <button class="btn btn-primary" onclick="connectFile()">Choose or create file</button>
      <p style="font-size:12px;color:var(--text3);margin-top:0.5rem">Works in Chrome and Edge.</p>
    </div>
    <div id="app-area" style="display:none">
      <div class="page-header">
        <span class="page-title" id="page-title">All entries</span>
        <div class="header-actions">
          <button class="btn btn-sm" id="btn-reload" onclick="loadFromFile()" title="Reload from disk">↺ Reload</button>
          <button class="btn btn-sm" id="btn-sync-all" onclick="syncAll()" title="Copy full sync prompt to clipboard — paste in any Claude chat">↗ Sync all</button>
          <button class="btn btn-sm" onclick="cleanupMemory()" title="Copy cleanup prompt — removes deleted entries from Claude memory">✕ Cleanup</button>
          <button class="btn btn-sm btn-primary" id="btn-add-toggle" onclick="toggleForm()">+ Add</button>
        </div>
      </div>
      <div class="add-form" id="add-form" style="display:none">
        <div class="field">
          <label>Type</label>
          <div class="type-picker" id="type-picker"></div>
        </div>
        <div class="field">
          <label>Content</label>
          <textarea id="f-content" rows="5" placeholder="Paste a paragraph, write an idea, note a fact…"></textarea>
        </div>
        <div class="field">
          <label>Title <span style="font-weight:400;opacity:0.5">(optional)</span></label>
          <input type="text" id="f-title" placeholder="Short label">
        </div>
        <div class="field">
          <label>Genes <span style="font-weight:400;opacity:0.5">(comma-separated)</span></label>
          <input type="text" id="f-genes" placeholder="MAPT, HDAC6, CACNA1C">
        </div>
        <div class="field">
          <label>Tags <span style="font-weight:400;opacity:0.5">(comma-separated)</span></label>
          <input type="text" id="f-tags" placeholder="neanderthal, admixture, selection">
        </div>
        <div class="field">
          <label>Source</label>
          <input type="text" id="f-source" placeholder="Platt et al. 2026 / https://…">
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" onclick="saveItem()">Save</button>
          <button class="btn" onclick="cancelEdit()">Cancel</button>
          <span class="spacer"></span>
          <button class="btn btn-sm btn-sync" id="btn-form-sync" onclick="syncEditingItem()" style="display:none">Sync ↗</button>
          <button class="btn btn-sm btn-danger" id="btn-form-delete" onclick="deleteEditingItem()" style="display:none">Delete</button>
        </div>
      </div>
      <div class="searchbar">
        <input type="search" id="search-input" placeholder="@MAPT @HDAC6 = AND · @MAPT,HDAC6 = OR · #tag · free text" oninput="renderList()" />
        <button class="btn btn-sm" onclick="document.getElementById('search-input').value='';renderList()">Clear</button>
      </div>
      <div id="item-list"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
// ============================================================
// Knowledge Base — local Chrome/Edge app
//   Uses File System Access API for reading/writing knowledge-base.json
//   Clipboard-based sync prompts for Claude memory integration
// ============================================================

const TYPES = [
  {key:'fact',label:'Fact',short:'Fact'},{key:'idea',label:'Idea',short:'Idea'},{key:'hypothesis',label:'Hypothesis',short:'Hypo'},
  {key:'quote',label:'Quote/Para',short:'Quot'},{key:'reference',label:'Reference',short:'Refe'},
  {key:'observation',label:'Observation',short:'Obsv'},{key:'connection',label:'Connection',short:'Conn'},{key:'people',label:'Person',short:'Pers'},
];
let items = [];
let activeType = 'all';
let activeTag = null;
let activeGene = null;
let sortKey = 'date';   // 'date' | 'synced' | 'type'
let sortAsc = false;     // false = descending (newest/unsynced first)
let tagSort = 'name';
let selectedType = 'fact';
let expandedId = null;
let editingId = null;
let fileHandle = null;

// --- IndexedDB (persist file handle across sessions) ---
function idbOpen() {
  return new Promise((res,rej)=>{
    const req = indexedDB.open('kb_fh',1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('h');
    req.onsuccess = e => res(e.target.result);
    req.onerror = ()=>rej(req.error);
  });
}
async function idbPut(key,val){
  const db=await idbOpen();
  return new Promise((res,rej)=>{const tx=db.transaction('h','readwrite');tx.objectStore('h').put(val,key);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});
}
async function idbGet(key){
  const db=await idbOpen();
  return new Promise((res,rej)=>{const tx=db.transaction('h','readonly');const r=tx.objectStore('h').get(key);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});
}

// --- File System Access ---
async function connectFile() {
  try {
    const [fh] = await window.showOpenFilePicker({
      types:[{description:'JSON',accept:{'application/json':['.json']}}],
      excludeAcceptAllOption:false
    });
    fileHandle = fh;
    await idbPut('fh', fileHandle);
    await loadFromFile();
    showApp();
  } catch(e) {
    if (e.name !== 'AbortError') {
      try {
        const fh2 = await window.showSaveFilePicker({
          suggestedName:'knowledge-base.json',
          types:[{description:'JSON',accept:{'application/json':['.json']}}]
        });
        fileHandle = fh2;
        await idbPut('fh', fileHandle);
        items = [];
        await saveToFile();
        showApp();
      } catch(e2) { if(e2.name!=='AbortError') showToast('Could not open file: '+e2.message); }
    }
  }
}

async function loadFromFile() {
  if (!fileHandle) return;
  try {
    const perm = await fileHandle.queryPermission({mode:'readwrite'});
    if (perm !== 'granted') await fileHandle.requestPermission({mode:'readwrite'});
    const file = await fileHandle.getFile();
    const text = await file.text();
    if (text.trim()) {
      const data = JSON.parse(text);
      items = (Array.isArray(data) ? data : (data.items || []));
    } else {
      items = [];
    }
    updateFileStatus(fileHandle.name);
    renderFilters();
    renderList();
  } catch(e) { showToast('Read error: '+e.message); }
}

async function saveToFile() {
  if (!fileHandle) return;
  try {
    const writable = await fileHandle.createWritable();
    await writable.write(JSON.stringify(items, null, 2));
    await writable.close();
  } catch(e) { showToast('Save error: '+e.message); }
}

async function tryRestoreHandle() {
  try {
    const fh = await idbGet('fh');
    if (fh) {
      fileHandle = fh;
      const perm = await fileHandle.queryPermission({mode:'readwrite'});
      if (perm === 'granted') {
        await loadFromFile();
        showApp();
      } else {
        updateFileStatus(fileHandle.name + ' (click Reload to re-authorize)');
        showApp();
      }
    }
  } catch(e) {}
}

function showApp() {
  document.getElementById('connect-screen').style.display='none';
  document.getElementById('app-area').style.display='';
  updateFileStatus(fileHandle?.name || '');
}

function updateFileStatus(name) {
  const el = document.getElementById('file-status');
  if (name) { el.textContent = name; el.className = 'file-status ok'; document.getElementById('btn-connect').textContent = '⇄ Switch file'; }
  else { el.textContent = 'No file'; el.className = 'file-status'; document.getElementById('btn-connect').textContent = 'Connect JSON file'; }
}

// --- Clipboard sync: single entry ---
function syncItem(e, id) {
  e.stopPropagation();
  const item = items.find(i => i.id === id);
  if (!item) return;
  const typeName = TYPES.find(t=>t.key===item.type)?.label || item.type;
  const title = item.title ? ` — ${item.title}` : '';
  const genes = (item.genes||[]).length ? `\nGenes: ${item.genes.join(', ')}` : '';
  const tags = (item.tags||[]).length ? `\nTags: ${item.tags.join(', ')}` : '';
  const source = item.source ? `\nSource: ${item.source}` : '';
  const prompt = `Please update your memory with this knowledge base entry (id: ${item.id}). If an entry with this id already exists in your memory, replace it entirely with this version. If it does not exist, add it.\n\n[${typeName}${title}] (id: ${item.id})\n${item.content}${genes}${tags}${source}`;
  navigator.clipboard.writeText(prompt).then(() => {
    item.synced = true;
    saveToFile();
    renderList();
    showToast('Sync prompt copied — paste in any Claude chat');
  }).catch(() => {
    showToast('Clipboard blocked — could not copy');
  });
}

// --- Clipboard sync: all entries (full replace) ---
function syncAll() {
  if (items.length === 0) { showToast('No entries to sync'); return; }
  const parts = items.map(item => {
    const typeName = TYPES.find(t=>t.key===item.type)?.label || item.type;
    const title = item.title ? ` — ${item.title}` : '';
    const genes = (item.genes||[]).length ? `\nGenes: ${item.genes.join(', ')}` : '';
    const tags = (item.tags||[]).length ? `\nTags: ${item.tags.join(', ')}` : '';
    const source = item.source ? `\nSource: ${item.source}` : '';
    return `[${typeName}${title}] (id: ${item.id})\n${item.content}${genes}${tags}${source}`;
  });
  const ids = items.map(i => i.id);
  const prompt = `Please perform a FULL REPLACE of all knowledge base entries in your memory. The complete and authoritative set of entries is listed below. For each entry, if it already exists in your memory (by id), replace it entirely. If it is new, add it. IMPORTANT: any knowledge base entry currently in your memory whose id is NOT in this list has been deleted — please remove it from your memory.\n\nCurrent entry ids: ${ids.join(', ')}\n\n---\n\n${parts.join('\n\n---\n\n')}`;
  navigator.clipboard.writeText(prompt).then(() => {
    items.forEach(i => i.synced = true);
    saveToFile();
    renderList();
    showToast('Full sync prompt copied — paste in any Claude chat');
  }).catch(() => {
    showToast('Clipboard blocked — could not copy');
  });
}

// --- Clipboard cleanup: delete removed entries from Claude memory ---
function cleanupMemory() {
  if (items.length === 0) { showToast('No entries — nothing to reference'); return; }
  const ids = items.map(i => i.id);
  const prompt = `Please check your memory for knowledge base entries. The following is the complete list of valid entry ids:\n\n${ids.join(', ')}\n\nAny knowledge base entry in your memory whose id is NOT in this list has been deleted from my knowledge base. Please remove those entries from your memory. Do not modify entries that are in this list.`;
  navigator.clipboard.writeText(prompt).then(() => {
    showToast('Cleanup prompt copied — paste in any Claude chat');
  }).catch(() => {
    showToast('Clipboard blocked — could not copy');
  });
}

// --- Sort ---
const SORTS = [{key:'date',label:'Modified'},{key:'synced',label:'Synced'},{key:'type',label:'Type'}];
function renderSortList() {
  const arrows = {true:'↑', false:'↓'};
  document.getElementById('sort-list').innerHTML = SORTS.map(s => {
    const active = sortKey === s.key;
    return `<button class="filter-chip ${active?'active':''}" onclick="setSort('${s.key}')">${s.label}${active?' '+arrows[sortAsc]:''}</button>`;
  }).join('');
}
function setSort(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = false; }
  renderSortList(); renderList();
}
function sortItems(arr) {
  // dir: 1 = ascending, -1 = descending (default for date = newest first)
  const dir = sortAsc ? 1 : -1;
  return arr.slice().sort((a,b) => {
    if (sortKey === 'date') {
      return dir * ((a.date||'').localeCompare(b.date||''));
    }
    if (sortKey === 'synced') {
      // ascending: synced first; descending (default): unsynced first
      const sa = a.synced ? 1 : 0, sb = b.synced ? 1 : 0;
      if (sa !== sb) return dir * (sa - sb);
      return -((a.date||'').localeCompare(b.date||'')); // secondary: newest first
    }
    if (sortKey === 'type') {
      const ta = TYPES.findIndex(t=>t.key===a.type), tb = TYPES.findIndex(t=>t.key===b.type);
      if (ta !== tb) return dir * (ta - tb);
      return -((a.date||'').localeCompare(b.date||'')); // secondary: newest first
    }
    return 0;
  });
}

// --- Filters ---
function renderFilters() {
  renderSortList();
  const used = [...new Set(items.map(i=>i.type))];
  let html = `<button class="filter-chip ${activeType==='all'&&!activeTag?'active':''}" onclick="setFilter('all')">All <span class="sb-count">${items.length}</span></button>`;
  TYPES.filter(t=>used.includes(t.key)).forEach(t=>{
    const n=items.filter(i=>i.type===t.key).length;
    html+=`<button class="filter-chip ${activeType===t.key&&!activeTag?'active':''}" data-type="${t.key}" onclick="setFilter('${t.key}')">${t.label} <span class="sb-count">${n}</span></button>`;
  });
  document.getElementById('filter-list').innerHTML=html;

  const allTagsRaw = [...new Set(items.flatMap(i=>i.tags||[]))];
  const tagCounts = {};
  const tagLatest = {};
  allTagsRaw.forEach(tag => {
    tagCounts[tag] = items.filter(i=>(i.tags||[]).includes(tag)).length;
    const dates = items.filter(i=>(i.tags||[]).includes(tag)).map(i=>i.date||'').sort();
    tagLatest[tag] = dates[dates.length-1] || '';
  });
  let allTags = [...allTagsRaw];
  if (tagSort === 'name')  allTags.sort((a,b)=>a.localeCompare(b));
  if (tagSort === 'count') allTags.sort((a,b)=>tagCounts[b]-tagCounts[a]);
  if (tagSort === 'date')  allTags.sort((a,b)=>tagLatest[b].localeCompare(tagLatest[a]));

  const sortIcons = {name:'Az', count:'#', date:'↓'};
  const sortTitles = {name:'Sorted by name — click to sort by count', count:'Sorted by count — click to sort by date', date:'Sorted by date — click to sort by name'};
  let tagHtml = '';
  if (allTags.length > 0) {
    tagHtml += `<div class="sb-section" style="margin-top:1rem;display:flex;align-items:center;justify-content:space-between;padding-right:0.75rem">
      <span>Tags</span>
      <button onclick="cycleTagSort()" title="${sortTitles[tagSort]}" style="font-family:var(--mono);font-size:10px;background:transparent;border:0.5px solid var(--border2);border-radius:4px;padding:1px 5px;cursor:pointer;color:var(--text3);line-height:1.4">${sortIcons[tagSort]}</button>
    </div>`;
    allTags.forEach(tag => {
      const n = tagCounts[tag];
      const safe = tag.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      tagHtml += `<button class="filter-chip ${activeTag===tag?'active':''}" onclick="setTagFilter('${safe}')">${esc(tag)} <span class="sb-count">${n}</span></button>`;
    });
  }
  document.getElementById('tag-filter-list').innerHTML = tagHtml;

  const hasFilter = activeGene || activeTag || activeType !== 'all';
  const title = activeGene ? `@${activeGene}` : activeTag ? `#${activeTag}` : activeType==='all' ? `All entries (${items.length})` : (TYPES.find(t=>t.key===activeType)?.label||activeType);
  const el = document.getElementById('page-title');
  el.innerHTML = hasFilter ? `<span style="cursor:pointer" onclick="clearAllFilters()" title="Back to all entries">← ${esc(title)}</span>` : esc(title);
}

function clearAllFilters() { activeType='all'; activeTag=null; activeGene=null; renderFilters(); renderList(); }
function setFilter(type) { activeType=type; activeTag=null; activeGene=null; renderFilters(); renderList(); }
function setTagFilter(tag) { activeTag = activeTag===tag ? null : tag; activeType='all'; activeGene=null; renderFilters(); renderList(); }
function cycleTagSort() { tagSort = tagSort==='name' ? 'count' : tagSort==='count' ? 'date' : 'name'; renderFilters(); }

// --- List & Cards ---
function renderList() {
  const raw=(document.getElementById('search-input')?.value||'').trim();
  // Parse @gene and #tag tokens. Space = AND, comma = OR.
  //   @MAPT @HDAC6   → entries with BOTH genes
  //   @MAPT,HDAC6    → entries with EITHER gene
  //   #ASD @MAPT     → tagged ASD AND has gene MAPT
  //   Mix with free text: #ASD tau → tagged ASD, content matches "tau"
  const tokens = raw.match(/[@#][^\s]+|\S+/g) || [];
  const geneAnd = [], geneOr = [], tagAnd = [], tagOr = [];
  const freeTerms = [];
  tokens.forEach(tok => {
    if (tok.startsWith('@')) {
      const names = tok.slice(1).split(',').filter(Boolean);
      if (names.length > 1) names.forEach(n => geneOr.push(n.toUpperCase()));
      else if (names.length === 1) geneAnd.push(names[0].toUpperCase());
    } else if (tok.startsWith('#')) {
      const names = tok.slice(1).split(',').filter(Boolean);
      if (names.length > 1) names.forEach(n => tagOr.push(n.toLowerCase()));
      else if (names.length === 1) tagAnd.push(names[0].toLowerCase());
    } else {
      freeTerms.push(tok.toLowerCase());
    }
  });
  const q = freeTerms.join(' ');
  let vis=sortItems(items);
  if(activeType!=='all') vis=vis.filter(i=>i.type===activeType);
  if(activeTag) vis=vis.filter(i=>(i.tags||[]).includes(activeTag));
  if(activeGene) vis=vis.filter(i=>(i.genes||[]).some(g=>g.toUpperCase()===activeGene.toUpperCase()));
  if(geneAnd.length) vis=vis.filter(i=>geneAnd.every(g=>(i.genes||[]).some(ig=>ig.toUpperCase()===g)));
  if(geneOr.length) vis=vis.filter(i=>geneOr.some(g=>(i.genes||[]).some(ig=>ig.toUpperCase()===g)));
  if(tagAnd.length) vis=vis.filter(i=>tagAnd.every(t=>(i.tags||[]).some(it=>it.toLowerCase()===t)));
  if(tagOr.length) vis=vis.filter(i=>tagOr.some(t=>(i.tags||[]).some(it=>it.toLowerCase()===t)));
  if(q) vis=vis.filter(i=>i.content.toLowerCase().includes(q)||(i.title||'').toLowerCase().includes(q)||(i.tags||[]).some(t=>t.toLowerCase().includes(q))||(i.genes||[]).some(g=>g.toLowerCase().includes(q))||(i.source||'').toLowerCase().includes(q));
  const list=document.getElementById('item-list');
  if(!list)return;
  if(vis.length===0){
    list.innerHTML=`<div class="empty"><p>${items.length===0?'Nothing yet.':'No matches.'}</p><small>${items.length===0?'Add your first entry above.':'Try a different search.'}</small></div>`;
    return;
  }
  // Round-robin distribution across columns for left-to-right sort order
  const colWidth = 450;
  const listWidth = list.offsetWidth || 900;
  const nCols = Math.max(1, Math.floor((listWidth + 8) / (colWidth + 8)));
  const cols = Array.from({length: nCols}, () => []);
  vis.forEach((item, i) => cols[i % nCols].push(renderCard(item)));
  list.innerHTML = cols.map(c => `<div class="item-col">${c.join('')}</div>`).join('');
}

function renderCard(item) {
  const exp=expandedId===item.id;
  const title=item.title||item.content.split('\n')[0].slice(0,80)+(item.content.length>80?'…':'');
  const tags=(item.tags||[]).map(t=>`<span class="tag" onclick="tagClick(event,'${t.replace(/'/g,"\\'")}') ">${esc(t)}</span>`).join('');
  const allGenes = item.genes||[];
  const visGenes = allGenes.slice(0,5).map(g=>`<span class="gene" onclick="geneClick(event,'${g.replace(/'/g,"\\'")}')"> ${esc(g)}</span>`).join('');
  const geneOverflow = allGenes.length > 5 ? `<span class="gene-more" title="${allGenes.length - 5} more genes">…</span>` : '';
  const genes = visGenes + geneOverflow;
  const claudeBadge = item.synced
    ? `<span class="synced-badge" title="Re-sync to Claude" style="cursor:pointer" onclick="syncItem(event,'${item.id}')">✓</span>`
    : `<span class="unsynced-badge" title="Sync to Claude" style="cursor:pointer" onclick="syncItem(event,'${item.id}')">⊘</span>`;
  const typeObj = TYPES.find(t=>t.key===item.type);
  const typeLabel = `<span class="type-badge" data-type="${item.type}" style="font-size:9px;padding:1px 6px" title="${typeObj?.label||item.type}">${typeObj?.short||item.type}</span>`;
  return `<div class="card${exp?' expanded':''}" data-type="${item.type}" onclick="toggleCard('${item.id}',event)">
  <div class="card-top">
    ${typeLabel}
    <span class="card-title-text">${esc(title)}</span>
    <span class="card-date">${fmtDate(item.date)}</span>
    ${claudeBadge}
  </div>
  <div class="card-content${exp?'':' clamped'}">${exp?md(item.content):esc(item.content)}</div>
  ${(tags||genes)?`<div class="card-meta">${tags}${genes}</div>`:''}
  ${exp?`<div class="card-actions">
    <button class="btn btn-sm" onclick="editItem(event,'${item.id}')">Edit</button>
  </div>`:''}
</div>`;
}

function tagClick(e, tag) { e.stopPropagation(); setTagFilter(tag); }
function geneClick(e, gene) { e.stopPropagation(); setGeneFilter(gene); }
function setGeneFilter(gene) { activeGene = activeGene===gene ? null : gene; activeTag=null; activeType='all'; renderFilters(); renderList(); }
function toggleCard(id,e){if(e&&e.target.closest('a[href]'))return;expandedId=expandedId===id?null:id;renderList();}

// --- Add / Edit ---
function editItem(e, id) {
  e.stopPropagation();
  const item = items.find(i => i.id === id);
  if (!item) return;
  editingId = item.id;
  selectedType = item.type;
  const f = document.getElementById('add-form');
  f.style.display = '';
  document.getElementById('btn-add-toggle').textContent = '× Cancel';
  buildTypePicker();
  document.getElementById('f-content').value = item.content;
  document.getElementById('f-title').value = item.title || '';
  document.getElementById('f-genes').value = (item.genes || []).join(', ');
  document.getElementById('f-tags').value = (item.tags || []).join(', ');
  document.getElementById('f-source').value = item.source || '';
  document.getElementById('f-content').focus();
  showFormEditButtons(true, item);
  f.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function toggleForm(){
  const f=document.getElementById('add-form');
  const open=f.style.display==='none';
  f.style.display=open?'':'none';
  document.getElementById('btn-add-toggle').textContent=open?'× Cancel':'+ Add';
  if(open){editingId=null;buildTypePicker();document.getElementById('f-content').focus();showFormEditButtons(false);}
  else{editingId=null;['f-content','f-title','f-genes','f-tags','f-source'].forEach(id=>document.getElementById(id).value='');showFormEditButtons(false);}
}

function showFormEditButtons(show, item) {
  document.getElementById('btn-form-sync').style.display = show ? '' : 'none';
  document.getElementById('btn-form-delete').style.display = show ? '' : 'none';
  if (show && item) {
    document.getElementById('btn-form-sync').textContent = item.synced ? 'Re-sync ↗' : 'Sync ↗';
  }
}

function syncEditingItem() {
  if (!editingId) return;
  syncItem({stopPropagation(){}}, editingId);
}

async function deleteEditingItem() {
  if (!editingId) return;
  if (!confirm('Delete this entry?')) return;
  const id = editingId;
  editingId = null;
  items = items.filter(i => i.id !== id);
  if (expandedId === id) expandedId = null;
  await saveToFile();
  document.getElementById('add-form').style.display = 'none';
  document.getElementById('btn-add-toggle').textContent = '+ Add';
  ['f-content','f-title','f-genes','f-tags','f-source'].forEach(id=>document.getElementById(id).value='');
  showFormEditButtons(false);
  renderFilters(); renderList(); showToast('Deleted');
}

function cancelEdit() {
  editingId = null;
  document.getElementById('add-form').style.display = 'none';
  document.getElementById('btn-add-toggle').textContent = '+ Add';
  ['f-content','f-title','f-genes','f-tags','f-source'].forEach(id=>document.getElementById(id).value='');
  showFormEditButtons(false);
  renderList();
}

function buildTypePicker(){
  document.getElementById('type-picker').innerHTML=TYPES.map(t=>
    `<button class="type-opt${selectedType===t.key?' active':''}" data-type="${t.key}" onclick="selType('${t.key}')">${t.label}</button>`
  ).join('');
}
function selType(k){selectedType=k;buildTypePicker();}

async function saveItem(){
  const content=document.getElementById('f-content').value.trim();
  if(!content){showToast('Content is required');return;}
  const genes=document.getElementById('f-genes').value.split(',').map(g=>g.trim()).filter(Boolean);
  const tags=document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const now = new Date().toISOString();
  if(editingId){
    const item=items.find(i=>i.id===editingId);
    if(item){
      item.type=selectedType; item.content=content;
      item.title=document.getElementById('f-title').value.trim();
      item.genes=genes; item.tags=tags; item.source=document.getElementById('f-source').value.trim();
      item.synced = false;
    }
  } else {
    items.push({
      id: Date.now().toString(36)+Math.random().toString(36).slice(2,6),
      type:selectedType, content,
      title:document.getElementById('f-title').value.trim(),
      genes, tags, source:document.getElementById('f-source').value.trim(),
      date:now, synced:false
    });
  }
  const wasEdit = !!editingId;
  editingId = null;
  await saveToFile();
  ['f-content','f-title','f-genes','f-tags','f-source'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('add-form').style.display='none';
  document.getElementById('btn-add-toggle').textContent='+ Add';
  renderFilters(); renderList();
  showToast(wasEdit ? 'Updated' : 'Saved');
}

async function deleteItem(e,id){
  e.stopPropagation();
  if(!confirm('Delete this entry?'))return;
  items=items.filter(i=>i.id!==id);
  if(expandedId===id)expandedId=null;
  await saveToFile();
  renderFilters(); renderList(); showToast('Deleted');
}

// --- Keyboard shortcuts ---
document.addEventListener('keydown', e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='n'){
    if(document.getElementById('app-area').style.display==='none') return;
    e.preventDefault();
    if(document.getElementById('add-form').style.display==='none') toggleForm();
  }
  if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){
    if(document.getElementById('add-form').style.display!=='none'){
      e.preventDefault();
      saveItem();
    }
  }
});
window.addEventListener('focus', ()=>{ if(fileHandle) loadFromFile(); });
let _resizeTimer;
window.addEventListener('resize', ()=>{ clearTimeout(_resizeTimer); _resizeTimer = setTimeout(renderList, 150); });

// --- Utilities ---
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function md(s){try{var h=marked.parse(s||'');return h.replace(/<a /g,'<a target="_blank" rel="noopener" ');}catch(e){return esc(s);}}
function fmtDate(iso){
  const d=new Date(iso),now=new Date(),diff=now-d;
  if(diff<60000)return 'just now';
  if(diff<3600000)return Math.floor(diff/60000)+'m';
  if(diff<86400000)return Math.floor(diff/3600000)+'h';
  if(diff<7*86400000)return Math.floor(diff/86400000)+'d';
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

// --- Init ---
tryRestoreHandle();
</script>
