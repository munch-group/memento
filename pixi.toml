[workspace]
authors = ["Kasper Munch <kaspermunch@birc.au.dk>"]
channels = ["conda-forge", "munch-group"]
name = "memento"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
digest = "python kb-sync-and-digest.py knowledge-base/ --days 30"
push = "git add -u ; git add knowledge-base ; git commit -m 'update' ; git push"
pull = "git pull --rebase"

[dependencies]
click = ">=8.3.1,<9"
anthropic = ">=0.50,<1"
