[workspace]
authors = ["Kasper Munch <kaspermunch@birc.au.dk>"]
channels = ["conda-forge", "munch-group"]
name = "memento"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
digest = "python kb-sync-and-digest.py knowledge-base/ --days 30"
# Runs memento.html's own inline script against a mock GitHub API and a mock filesystem.
test = "node tests/gh-backend.test.mjs && node tests/fsa-regression.test.mjs && node tests/boot.test.mjs && node tests/offline.test.mjs && node tests/tag-editor.test.mjs && node tests/dashboard.test.mjs && node tests/controls.test.mjs && node tests/timeline.test.mjs && node tests/graph.test.mjs && node tests/genes.test.mjs && node tests/genes-live.test.mjs && node tests/genes-freeze.test.mjs && python tests/mcp_test.py && python tests/interactions_test.py"
# Edits made on iOS commit straight to main via the GitHub API, so rebase onto them before
# pushing — otherwise this push is rejected as non-fast-forward.
sync = "git add -u ; git add knowledge-base ; git commit -q -m 'update' ; git pull -q --rebase && git push -q"
pull = "git pull --rebase"


[dependencies]
click = ">=8.3.1,<9"
anthropic = ">=0.50,<1"

# Pinned to the 1.x stable line on purpose: the SDK's README on main documents the 2.0 beta
# (`from mcp.server import MCPServer`), which is not what `pip install mcp` gives you.
[pypi-dependencies]
mcp = ">=1.28,<2"
